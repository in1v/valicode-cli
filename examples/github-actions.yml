name: Valicode

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Valicode
        run: python -m pip install valicode

      - name: Run Valicode
        env:
          VALICODE_API_KEY: ${{ secrets.VALICODE_API_KEY }}
        run: |
          mkdir -p ~/.valicode
          python - <<'PY'
          import os
          from pathlib import Path
          Path.home().joinpath(".valicode").mkdir(exist_ok=True)
          Path.home().joinpath(".valicode/config.toml").write_text(f'api_key = "{os.environ["VALICODE_API_KEY"]}"\n')
          PY
          valicode scan . --output summary
