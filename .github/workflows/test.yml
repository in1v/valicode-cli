name: Test

on:
  push:
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e .

      - name: Version
        run: valicode --version

      - name: Dry run
        run: |
          mkdir sample
          printf 'print("hello")\n' > sample/app.py
          valicode scan sample --dry-run
